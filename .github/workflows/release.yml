name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump level"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  pull-requests: write

env:
  ZVEC_REPO: alibaba/zvec
  ZVEC_REV: v0.4.0

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      zvec_sha: ${{ steps.zvec-sha.outputs.sha }}
      version: ${{ steps.next-version.outputs.version }}
    steps:
      - name: Checkout zvec-rs
        uses: actions/checkout@v6

      - name: Checkout zvec
        uses: actions/checkout@v6
        with:
          repository: ${{ env.ZVEC_REPO }}
          ref: ${{ env.ZVEC_REV }}
          path: _zvec

      - name: Get zvec commit SHA
        id: zvec-sha
        run: echo "sha=$(git -C _zvec rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Compute next version
        id: next-version
        run: |
          CURRENT=$(cargo metadata --manifest-path Cargo.toml --format-version 1 --no-deps | jq -r '.packages[] | select(.name == "zvec") | .version')
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          case "${{ inputs.bump }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac
          echo "version=${MAJOR}.${MINOR}.${PATCH}" >> "$GITHUB_OUTPUT"

      - name: Upload header
        uses: actions/upload-artifact@v7
        with:
          name: zvec-header
          path: _zvec/src/include/zvec/c_api.h

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            cmake_extra: ""
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            cmake_extra: ""
          - target: x86_64-apple-darwin
            os: macos-15-intel
            cmake_extra: "-DENABLE_NATIVE=OFF -DCMAKE_CXX_FLAGS=-march=x86-64-v2 -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0"
          - target: aarch64-apple-darwin
            os: macos-latest
            cmake_extra: "-DCMAKE_OSX_DEPLOYMENT_TARGET=11.0"
          - target: aarch64-apple-ios
            os: macos-latest
            cmake_extra: "-DCMAKE_SYSTEM_NAME=iOS -DCMAKE_OSX_DEPLOYMENT_TARGET=13.0 -DCMAKE_OSX_ARCHITECTURES=arm64 -DIOS=ON"
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            cmake_extra: ""
          - target: aarch64-linux-android
            os: ubuntu-latest
            cmake_extra: "-DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake -DANDROID_ABI=arm64-v8a -DANDROID_PLATFORM=android-21 -DANDROID_STL=c++_static -DENABLE_NATIVE=OFF -DAUTO_DETECT_ARCH=OFF"

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout zvec-rs
        uses: actions/checkout@v6

      - name: Checkout zvec
        uses: actions/checkout@v6
        with:
          repository: ${{ env.ZVEC_REPO }}
          ref: ${{ env.ZVEC_REV }}
          path: _zvec
          submodules: recursive

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@v6

      - name: Setup Android NDK
        if: matrix.target == 'aarch64-linux-android'
        uses: android-actions/setup-android@v3
        with:
          packages: "ndk;26.1.10909125"

      - name: Set ANDROID_NDK_HOME
        if: matrix.target == 'aarch64-linux-android'
        shell: bash
        run: echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.1.10909125" >> "$GITHUB_ENV"

      # Android needs host protoc first — use a separate source copy
      # so patches applied here don't conflict with the cross-compile build.
      # iOS is also a cross-compile and cannot use a target-built protoc.
      - name: Build host protoc
        if: matrix.target == 'aarch64-linux-android' || matrix.target == 'aarch64-apple-ios'
        shell: bash
        run: |
          cp -r _zvec _zvec-host
          cmake -S _zvec-host -B _zvec-host/build -G Ninja -DCMAKE_POLICY_VERSION_MINIMUM=3.5
          cmake --build _zvec-host/build --target protoc --parallel

      - name: Configure CMake
        shell: bash
        run: |
          EXTRA="${{ matrix.cmake_extra }}"
          PROTOC_FLAG=""
          SDK_FLAG=""
          if [ "${{ matrix.target }}" = "aarch64-linux-android" ] || [ "${{ matrix.target }}" = "aarch64-apple-ios" ]; then
            PROTOC_FLAG="-DGLOBAL_CC_PROTOBUF_PROTOC=${{ github.workspace }}/_zvec-host/build/bin/protoc"
          fi
          if [ "${{ matrix.target }}" = "aarch64-apple-ios" ]; then
            SDK_FLAG="-DCMAKE_OSX_SYSROOT=$(xcrun --sdk iphoneos --show-sdk-path)"
          fi
          cmake -S _zvec -B _zvec/build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DBUILD_C_BINDINGS=ON \
            -DBUILD_PYTHON_BINDINGS=OFF \
            -DBUILD_TOOLS=OFF \
            $EXTRA $PROTOC_FLAG $SDK_FLAG

      - name: Build
        shell: bash
        run: cmake --build _zvec/build --parallel

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force staging
          Copy-Item "_zvec/build/bin/*.dll" staging/
          Copy-Item "_zvec/build/lib/*.lib" staging/
          tar -czf "zvec_c_api-${{ matrix.target }}.tar.gz" -C staging .

      - name: Package (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          mkdir -p staging
          cp _zvec/build/lib/libzvec_c_api.dylib staging/
          tar -czf "zvec_c_api-${{ matrix.target }}.tar.gz" -C staging .

      - name: Package (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          mkdir -p staging
          cp _zvec/build/lib/libzvec_c_api.so staging/
          tar -czf "zvec_c_api-${{ matrix.target }}.tar.gz" -C staging .

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: zvec_c_api-${{ matrix.target }}
          path: "zvec_c_api-${{ matrix.target }}.tar.gz"

  release:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: false

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: zvec_c_api-*
          merge-multiple: true

      - name: Download header
        uses: actions/download-artifact@v8
        with:
          name: zvec-header
          path: _header

      - name: Compute all SHA256s
        id: checksums
        run: |
          for f in artifacts/zvec_c_api-*.tar.gz; do
            target=$(basename "$f" | sed 's/zvec_c_api-//;s/.tar.gz//')
            key=$(echo "$target" | tr '-' '_')
            hash=$(sha256sum "$f" | cut -d' ' -f1)
            echo "${key}=${hash}" >> "$GITHUB_OUTPUT"
          done

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: v${{ needs.prepare.outputs.version }}
        run: |
          gh release create "$TAG" \
            --title "v${{ needs.prepare.outputs.version }} (zvec@${{ needs.prepare.outputs.zvec_sha }})" \
            --notes "Built from ${{ env.ZVEC_REPO }}@${{ needs.prepare.outputs.zvec_sha }}" \
            artifacts/zvec_c_api-*.tar.gz

      - name: Update header
        run: cp _header/c_api.h include/zvec/c_api.h

      - name: Update build.rs checksums
        run: |
          sed -i \
            -e 's|("x86_64-unknown-linux-gnu", "[^"]*")|("x86_64-unknown-linux-gnu", "${{ steps.checksums.outputs.x86_64_unknown_linux_gnu }}")|' \
            -e 's|("aarch64-unknown-linux-gnu", "[^"]*")|("aarch64-unknown-linux-gnu", "${{ steps.checksums.outputs.aarch64_unknown_linux_gnu }}")|' \
            -e 's|("x86_64-apple-darwin", "[^"]*")|("x86_64-apple-darwin", "${{ steps.checksums.outputs.x86_64_apple_darwin }}")|' \
            -e 's|("aarch64-apple-darwin", "[^"]*")|("aarch64-apple-darwin", "${{ steps.checksums.outputs.aarch64_apple_darwin }}")|' \
            -e 's|("aarch64-apple-ios", "[^"]*")|("aarch64-apple-ios", "${{ steps.checksums.outputs.aarch64_apple_ios }}")|' \
            -e 's|("x86_64-pc-windows-msvc", "[^"]*")|("x86_64-pc-windows-msvc", "${{ steps.checksums.outputs.x86_64_pc_windows_msvc }}")|' \
            -e 's|("aarch64-linux-android", "[^"]*")|("aarch64-linux-android", "${{ steps.checksums.outputs.aarch64_linux_android }}")|' \
            build.rs

      - name: Bump version in Cargo.toml
        run: |
          sed -i "s/^version = \".*\"/version = \"${{ needs.prepare.outputs.version }}\"/" Cargo.toml
          cargo update -p zvec

      - name: Create PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH="release/v${{ needs.prepare.outputs.version }}"
          git checkout -b "$BRANCH"
          git add build.rs include/zvec/c_api.h Cargo.toml Cargo.lock
          git commit -m "release: v${{ needs.prepare.outputs.version }} (zvec@${{ needs.prepare.outputs.zvec_sha }})"
          git push origin "$BRANCH"
          gh pr create \
            --title "release: v${{ needs.prepare.outputs.version }} (zvec@${{ needs.prepare.outputs.zvec_sha }})" \
            --body "Built from ${{ env.ZVEC_REPO }}@${{ needs.prepare.outputs.zvec_sha }}. [Release](https://github.com/${{ github.repository }}/releases/tag/v${{ needs.prepare.outputs.version }})"
